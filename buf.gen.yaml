version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/liqcui/bm-distributed-solution/api/proto/gen
plugins:
  - remote: buf.build/protocolbuffers/go
    out: api/proto/gen
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: api/proto/gen
    opt:
      - paths=source_relative

syntax = "proto3";

package api;

option go_package = "github.com/liqcui/bm-distributed-solution/api/proto/gen;apipb";

import "google/protobuf/timestamp.proto";

// Server represents a managed server
message Server {
  string id = 1;
  string hostname = 2;
  string ip_address = 3;
  string mac_address = 4;
  string os_type = 5;
  string os_version = 6;
  string architecture = 7;
  string agent_mode = 8;  // persistent, agentless
  string status = 9;      // online, offline, installing, upgrading, maintenance
  google.protobuf.Timestamp last_heartbeat = 10;
  map<string, string> tags = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

// Job represents a high-level operation across multiple servers
message Job {
  string id = 1;
  string job_type = 2;  // install_os, patch, deploy_package, upgrade_os
  string name = 3;
  string description = 4;
  bytes target_filter = 5;  // JSON query for selecting servers
  bytes parameters = 6;     // JSON job parameters
  string status = 7;        // pending, scheduled, running, completed, failed, cancelled
  int32 priority = 8;       // 0=low, 1=normal, 2=high, 3=critical
  string created_by = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp scheduled_at = 11;
  google.protobuf.Timestamp started_at = 12;
  google.protobuf.Timestamp completed_at = 13;
  int32 total_tasks = 14;
  int32 completed_tasks = 15;
  int32 failed_tasks = 16;
}

// Task represents an individual server task within a job
message Task {
  string id = 1;
  string job_id = 2;
  string server_id = 3;
  string task_type = 4;
  bytes parameters = 5;
  string status = 6;  // pending, scheduled, running, completed, failed, skipped
  int32 attempts = 7;
  int32 max_attempts = 8;
  bytes result = 9;  // JSON task result
  string error_message = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp started_at = 12;
  google.protobuf.Timestamp completed_at = 13;
}

// Package represents a software package
message Package {
  string id = 1;
  string name = 2;
  string version = 3;
  string architecture = 4;
  string package_type = 5;  // deb, rpm, msi, pkg
  int64 size_bytes = 6;
  string checksum = 7;
  string repository_url = 8;
  google.protobuf.Timestamp created_at = 9;
}

// Patch represents an OS patch/update
message Patch {
  string id = 1;
  string patch_id = 2;      // vendor patch ID (KB123456, USN-1234-1)
  string name = 3;
  string description = 4;
  string severity = 5;      // critical, important, moderate, low
  string category = 6;      // security, bugfix, enhancement
  string os_type = 7;
  string os_version = 8;
  google.protobuf.Timestamp release_date = 9;
  repeated string cve_ids = 10;
  repeated string supersedes = 11;  // patch IDs this replaces
}

// AuditLog represents an audit trail entry
message AuditLog {
  string id = 1;
  string user_id = 2;
  string username = 3;
  string action = 4;       // create_job, cancel_job, update_server, etc.
  string resource_type = 5;
  string resource_id = 6;
  bytes changes = 7;       // JSON before/after data
  string ip_address = 8;
  string user_agent = 9;
  google.protobuf.Timestamp timestamp = 10;
}

// User represents a system user
message User {
  string id = 1;
  string username = 2;
  string email = 3;
  string role = 4;  // admin, operator, viewer
  bool enabled = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp last_login = 7;
}

// PXEConfiguration represents a PXE boot configuration
message PXEConfiguration {
  string id = 1;
  string server_id = 2;
  string mac_address = 3;
  string boot_image = 4;
  string kernel_args = 5;
  string kickstart_url = 6;
  bool enabled = 7;
  google.protobuf.Timestamp created_at = 8;
}

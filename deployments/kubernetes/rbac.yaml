apiVersion: v1
kind: ServiceAccount
metadata:
  name: reignx
  namespace: reignx
  labels:
    app.kubernetes.io/name: reignx
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: reignx-role
  namespace: reignx
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: reignx-rolebinding
  namespace: reignx
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: reignx-role
subjects:
  - kind: ServiceAccount
    name: reignx
    namespace: reignx

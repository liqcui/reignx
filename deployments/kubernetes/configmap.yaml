apiVersion: v1
kind: ConfigMap
metadata:
  name: reignx-config
  namespace: reignx
  labels:
    app.kubernetes.io/name: reignx
    app.kubernetes.io/component: config
data:
  apiserver.yaml: |
    server:
      http_port: 8080
      grpc_port: 9000
      read_timeout: 30s
      write_timeout: 30s
      max_header_bytes: 1048576

    database:
      host: postgres-service
      port: 5432
      database: bm_solution
      ssl_mode: disable
      max_open_conns: 100
      max_idle_conns: 10
      conn_max_lifetime: 1h

    etcd:
      endpoints:
        - http://etcd-0.etcd-headless:2379
        - http://etcd-1.etcd-headless:2379
        - http://etcd-2.etcd-headless:2379
      dial_timeout: 5s
      request_timeout: 10s

    nats:
      url: nats://nats-service:4222
      max_reconnects: 10
      reconnect_wait: 2s

    observability:
      metrics:
        enabled: true
        namespace: reignx
      logging:
        level: info
        output_paths:
          - stdout
      tracing:
        enabled: true
        jaeger_endpoint: http://jaeger-collector:14268/api/traces

    security:
      pki:
        root_ca_cert: /app/certs/ca/root/ca-cert.pem
        server_ca_cert: /app/certs/ca/intermediate/server-ca-cert.pem
        agent_ca_cert: /app/certs/ca/intermediate/agent-ca-cert.pem
      jwt:
        secret_key: change-this-in-production
        token_expiry: 1h

  agent.yaml: |
    server:
      api_server_addr: reignxd-service:9000
      heartbeat_interval: 30s
      reconnect_backoff: 5s
      max_reconnect_attempts: 10

    executor:
      max_concurrent_tasks: 5
      task_timeout: 1h
      script_dir: /tmp/reignx-scripts

    cache:
      type: sqlite
      path: /app/cache/agent.db
      ttl: 720h

    observability:
      metrics:
        enabled: true
        namespace: reignx_agent
      logging:
        level: info
        output_paths:
          - stdout
      tracing:
        enabled: false

    security:
      tls:
        enabled: true
        cert_file: /app/certs/agent-cert.pem
        key_file: /app/certs/agent-key.pem
        ca_file: /app/certs/ca-bundle.pem
